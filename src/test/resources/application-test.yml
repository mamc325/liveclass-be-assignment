spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    time-zone: Asia/Seoul

logging:
  level:
    org.hibernate.SQL: WARN
    org.testcontainers: INFO
